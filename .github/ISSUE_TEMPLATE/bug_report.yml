name: Bug Report
description: Report a defect or unexpected behaviour
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the defect. Include steps to reproduce when possible.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behaviour
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1.
        2.
        3.

  - type: input
    id: requirement
    attributes:
      label: Related Requirement
      description: FR-XXX or issue link if applicable
      placeholder: FR-001

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Critical
        - High
        - Medium
        - Low

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: Version, browser, OS, deployment environment
