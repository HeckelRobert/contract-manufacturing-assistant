name: Feature Request
description: Propose a new feature or enhancement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the business need. Link to requirements when available.

  - type: textarea
    id: problem
    attributes:
      label: Problem or Opportunity
      description: What business goal does this support?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: How will we know this is done?
      placeholder: |
        - [ ]
        - [ ]
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Must
        - Should
        - Could

  - type: checkboxes
    id: impact
    attributes:
      label: Impact Areas
      options:
        - label: Architecture
        - label: Security
        - label: Operations
        - label: Documentation
        - label: AI / LLM usage
